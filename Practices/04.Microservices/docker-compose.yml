# docker-compose.yml
version: '3'
services:

  
  teams-db:
    image: mysql:latest
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: teams_db
      MYSQL_USER: teams_user
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    networks:
      - microservices_network

  teamsmembers-db:
    image: mysql:latest
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: membersservicedb
      MYSQL_USER: teamsmembers_user
      MYSQL_PASSWORD: admin
    ports:
      - "3308:3306"
    networks:
      - microservices_network




  teams:
    build: ./teams
    ports:
      - "3307:3307"
    depends_on:
      - teams-db
    networks:
      - microservices_network

  teamsmembers:
    build: ./teamsmembers
    ports:
      - "3308:3308"
    depends_on:
      - teamsmembers-db
    networks:
      - microservices_network




networks:
  microservices_network:
    driver: bridge

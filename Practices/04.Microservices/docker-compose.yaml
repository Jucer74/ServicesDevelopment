      - teamsdb:/var/lib/mysql

  membersdb:
    image: mysql:8.0.34
    restart: always
    environment:
      MYSQL_DATABASE: 'membersservicedb'
      MYSQL_USER: 'membersserviceuser'
      MYSQL_PASSWORD: 'M3mb3rsS3rv1c3Us3r*01'
      MYSQL_ROOT_PASSWORD: 'root'
    ports:
      - '3308:3306' 
    volumes:
      - membersdb:/var/lib/mysql

volumes:
  teamsdb:
  membersdb:
